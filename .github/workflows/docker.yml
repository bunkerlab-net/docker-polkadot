name: Docker

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      version:
        description: The version of the image
        value: ${{ jobs.push.outputs.version }}

permissions: {}

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/polkadot

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.runs-on }}
    permissions:
      packages: write
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runs-on: blacksmith-8vcpu-ubuntu-2404
          - arch: arm64
            runs-on: blacksmith-8vcpu-ubuntu-2404-arm
    steps:
      - run: lscpu
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          cache-binary: false
          version: latest
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.IMAGE }}:sha-${{ github.sha }}-${{ matrix.arch }}
          cache-from: |
            type=gha,scope=docker-build-${{ matrix.arch }}
            type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: |
            type=gha,mode=min,scope=docker-build-${{ matrix.arch }}
          context: .
          build-args: >-
            ${{ github.event_name == 'release' && format('VERSION={0}', github.ref_name) || '' }}

  push:
    name: Push
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          cache-binary: false
          version: latest
      - name: Check if release is latest
        if: github.event_name == 'release'
        id: check_latest
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RELEASE_ID: ${{ github.event.release.id }}
          REPO: ${{ github.repository }}
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/latest" \
            | jq -r '.id')
          echo "is_latest=$([[ "$RELEASE_ID" == "$CURRENT_RELEASE_ID" ]] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'release' && steps.check_latest.outputs.is_latest == 'true' }}
            type=raw,value=stable,enable=${{ github.event_name == 'release' && steps.check_latest.outputs.is_latest == 'true' }}
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
      - name: Create and push multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE: ${{ env.IMAGE }}
          SHA: ${{ github.sha }}
        run: |-
          echo "$TAGS" | while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              echo "Creating manifest for: $tag"
              docker buildx imagetools create \
                --tag "$tag" \
                "${IMAGE}:sha-${SHA}-amd64" \
                "${IMAGE}:sha-${SHA}-arm64"
            fi
          done
